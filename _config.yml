  repo: "matheusysd/matheusysd.github.io"
  repo_id: "MDEwOlJlcG9zaXRvcnkyNDg2MTQwMjM="
  category: "Announcements"
  category_id: "DIC_kwDODtGMh84C5Cda"
  mapping: "pathname"
  strict: "0"
  reactions_enabled: "1"
  emit_metadata: "0"
  input_position: "top"
  theme: "light_protanopia"
  lang: "en"
  loading: "lazy"
include: ["_pages"]
permalink: /:title/

# Authors
